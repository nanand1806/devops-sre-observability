# A self-contained observability stack: Prometheus scrapes metrics and
# evaluates SLO alert rules, Grafana visualizes them with a provisioned
# golden-signals dashboard, node-exporter provides host metrics.
#
#   docker compose up -d
#   Grafana:    http://localhost:3000   (admin / admin)
#   Prometheus: http://localhost:9090
#
services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: obs-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.2.0
    container_name: obs-grafana
    restart: unless-stopped
    environment:
      # Local demo only. Change this before exposing Grafana anywhere.
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: obs-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
