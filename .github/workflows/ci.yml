name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  terraform:
    name: Terraform fmt & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Validate all projects
        run: |
          set -euo pipefail
          found=0
          while IFS= read -r dir; do
            found=1
            echo "::group::Validating $dir"
            terraform -chdir="$dir" init -backend=false -input=false -no-color
            terraform -chdir="$dir" validate -no-color
            echo "::endgroup::"
          done < <(find projects -name versions.tf -exec dirname {} \;)
          if [ "$found" -eq 0 ]; then
            echo "No Terraform projects found to validate."
          fi
